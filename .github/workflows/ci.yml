name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: build-and-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (astro check)
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --accept 200,204,301,302,403,429
            --exclude-mail
            --exclude 'github\.com/JakubKarwacki/myNotebook/tree/archive-2019'
            --exclude 'jakubkarwacki\.github\.io/myNotebook'
            dist/**/*.html
          fail: false
          output: lychee-report.md
